<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GroundHalo — Field Ops</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#080a08; --bg2:#0d0f0d; --bg3:#141614; --cyan:#00c8d4; --cyan-faint:rgba(0,200,212,0.08); --cyan-border:rgba(0,200,212,0.2); --amber:#ffd700; --red:#ff4455; --text:rgba(255,255,255,0.85); --text-dim:rgba(255,255,255,0.4); --border:#1c1e1c; }
  html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; font-size:11px; }
  body::after { content:''; position:fixed; inset:0; z-index:9999; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px); animation:scanlines 8s linear infinite; }
  @keyframes scanlines { from{background-position:0 0} to{background-position:0 100px} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .blink { animation:blink 1.2s infinite; }
  .gh-wrap { display:flex; flex-direction:column; height:100vh; }
  .gh-header { height:44px; flex-shrink:0; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 16px; }
  .gh-logo { display:flex; align-items:center; gap:10px; }
  .gh-logo-dot { width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
  .gh-logo-text { font-size:13px; font-weight:700; letter-spacing:4px; color:var(--cyan); }
  .gh-logo-sub { font-size:9px; color:var(--text-dim); letter-spacing:2px; }
  .gh-header-center { display:flex; align-items:center; gap:20px; font-size:10px; color:var(--text-dim); letter-spacing:1px; }
  .gh-header-center span { color:var(--text); }
  .gh-header-right { display:flex; align-items:center; gap:12px; }
  .gh-live { display:flex; align-items:center; gap:6px; background:var(--cyan-faint); border:1px solid var(--cyan-border); padding:3px 10px; font-size:9px; font-weight:700; letter-spacing:2px; color:var(--cyan); }
  .gh-live-dot { width:5px; height:5px; border-radius:50%; background:var(--cyan); box-shadow:0 0 6px var(--cyan); }
  .gh-btn { font-size:9px; color:var(--text-dim); cursor:pointer; letter-spacing:1px; padding:3px 8px; border:1px solid var(--border); transition:color 0.2s,border-color 0.2s; }
  .gh-btn:hover { color:var(--cyan); border-color:var(--cyan-border); }
  .gh-body { display:flex; flex:1; overflow:hidden; }
  .gh-map-wrap { flex:1; position:relative; }
  #gh-map { width:100%; height:100%; }
  #gh-map .leaflet-tile-pane { filter:brightness(0.4) saturate(0.25) hue-rotate(160deg); }
  .gh-turf-badges { position:absolute; bottom:12px; left:12px; z-index:1000; display:flex; flex-direction:column; gap:6px; }
  .gh-turf-badge { background:rgba(8,10,8,0.9); border:1px solid var(--border); padding:5px 10px; font-size:10px; letter-spacing:1px; backdrop-filter:blur(4px); }
  .badge-name { color:var(--text-dim); margin-bottom:2px; }
  .badge-count { font-weight:700; }
  .badge-good .badge-count { color:var(--cyan); }
  .badge-warn .badge-count { color:var(--amber); }
  .badge-bad .badge-count { color:var(--red); }
  .map-overlay { position:absolute; inset:0; z-index:999; background:rgba(8,10,8,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; font-size:10px; letter-spacing:2px; color:var(--text-dim); }
  .map-overlay.hidden { display:none; }
  .gh-panel { width:280px; flex-shrink:0; background:var(--bg2); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .gh-panel-section { border-bottom:1px solid var(--border); padding:10px 12px; }
  .gh-section-label { font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; margin-bottom:10px; }
  .gh-kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .gh-kpi { background:var(--cyan-faint); border:1px solid var(--border); padding:8px 10px; }
  .gh-kpi-label { font-size:8px; color:var(--text-dim); letter-spacing:1px; margin-bottom:4px; }
  .gh-kpi-val { font-size:20px; font-weight:700; line-height:1; color:var(--cyan); }
  .gh-kpi-val.amber { color:var(--amber); }
  .gh-kpi-val.red { color:var(--red); }
  .gh-canvassers { flex:1; overflow-y:auto; }
  .gh-canvassers::-webkit-scrollbar { width:3px; }
  .gh-canvassers::-webkit-scrollbar-track { background:var(--bg); }
  .gh-canvassers::-webkit-scrollbar-thumb { background:var(--border); }
  .gh-canvasser { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid rgba(28,30,28,0.6); }
  .gh-c-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .gh-c-info { flex:1; min-width:0; }
  .gh-c-name { font-weight:700; font-size:10px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gh-c-status { font-size:8px; letter-spacing:1px; color:var(--text-dim); }
  .gh-c-meta { text-align:right; flex-shrink:0; }
  .gh-c-ping { font-size:9px; font-weight:700; }
  .gh-c-ping-label { font-size:8px; color:var(--text-dim); letter-spacing:1px; }
  .status-on .gh-c-dot { background:var(--cyan); box-shadow:0 0 5px var(--cyan); }
  .status-on .gh-c-name, .status-on .gh-c-ping { color:var(--cyan); }
  .status-near .gh-c-dot { background:var(--amber); }
  .status-near .gh-c-name, .status-near .gh-c-ping { color:var(--amber); }
  .status-off .gh-c-dot { background:var(--red); }
  .status-off .gh-c-name, .status-off .gh-c-ping { color:var(--red); }
  .status-stale .gh-c-dot { background:#444; }
  .status-stale .gh-c-name, .status-stale .gh-c-ping { color:#555; }
  .empty-state { padding:24px 12px; text-align:center; color:var(--text-dim); font-size:10px; letter-spacing:1px; line-height:2; }
  .gh-ticker { height:28px; flex-shrink:0; background:var(--bg2); border-top:1px solid var(--border); display:flex; align-items:center; overflow:hidden; }
  .gh-ticker-prefix { padding:0 12px; font-size:9px; letter-spacing:2px; color:var(--text-dim); border-right:1px solid var(--border); height:100%; display:flex; align-items:center; flex-shrink:0; white-space:nowrap; }
  .gh-ticker-track { display:flex; align-items:center; white-space:nowrap; padding-left:20px; }
  .gh-ticker-track.animate { animation:ticker 60s linear infinite; }
  @keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  .gh-tick-item { padding:0 20px; font-size:9px; color:var(--text-dim); border-right:1px solid var(--border); }
  .tick-on { color:var(--cyan); font-weight:700; }
  .tick-near { color:var(--amber); font-weight:700; }
  .tick-off { color:var(--red); font-weight:700; }
  .tick-name { color:var(--text); }
  .leaflet-tooltip { background:transparent !important; border:none !important; box-shadow:none !important; font-family:'Space Mono',monospace !important; font-size:9px !important; font-weight:700 !important; letter-spacing:1px !important; text-transform:uppercase !important; padding:0 !important; }
  .leaflet-container { background:#080a08 !important; }
</style>
</head>
<body>
<div class="gh-wrap">
  <div class="gh-header">
    <div class="gh-logo">
      <div class="gh-logo-dot blink"></div>
      <div>
        <div class="gh-logo-text">GROUNDHALO</div>
        <div class="gh-logo-sub">// LIVE OPS</div>
      </div>
    </div>
    <div class="gh-header-center">
      <span id="clock-et">--:--:-- ET</span>
    </div>
    <div class="gh-header-right">
      <div class="gh-btn" id="refresh-btn">↺ REFRESH</div>
      <div class="gh-live"><div class="gh-live-dot blink"></div>LIVE</div>
    </div>
  </div>
  <div class="gh-body">
    <div class="gh-map-wrap">
      <div id="gh-map"></div>
      <div id="map-overlay" class="map-overlay"><div>LOADING FIELD DATA...</div></div>
      <div class="gh-turf-badges" id="turf-badges"></div>
    </div>
    <div class="gh-panel">
      <div class="gh-panel-section">
        <div class="gh-section-label">// SHIFT METRICS</div>
        <div class="gh-kpi-grid">
          <div class="gh-kpi"><div class="gh-kpi-label">ACTIVE</div><div class="gh-kpi-val" id="kpi-active">—</div></div>
          <div class="gh-kpi"><div class="gh-kpi-label">ON TURF</div><div class="gh-kpi-val" id="kpi-onturf">—</div></div>
          <div class="gh-kpi"><div class="gh-kpi-label">STALE</div><div class="gh-kpi-val amber" id="kpi-stale">—</div></div>
          <div class="gh-kpi"><div class="gh-kpi-label">OFF TURF</div><div class="gh-kpi-val red" id="kpi-off">—</div></div>
        </div>
      </div>
      <div class="gh-panel-section" style="padding-bottom:0;">
        <div class="gh-section-label">// FIELD UNITS</div>
      </div>
      <div class="gh-canvassers" id="canvasser-list">
        <div class="empty-state">LOADING...</div>
      </div>
    </div>
  </div>
  <div class="gh-ticker">
    <div class="gh-ticker-prefix">LIVE ▶</div>
    <div style="overflow:hidden;flex:1;">
      <div class="gh-ticker-track" id="ticker-track">AWAITING DATA...</div>
    </div>
  </div>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@base44/sdk';

const base44 = createClient({ appId: '6992704345c7617b449cf3de' });
let map=null, markers={}, assignments=[];

// Map init with geolocation
const initMap = () => {
  map = L.map('gh-map', { zoomControl:true, attributionControl:false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => map.setView([pos.coords.latitude, pos.coords.longitude], 13),
      () => map.setView([42.305, -71.075], 13)
    );
  } else {
    map.setView([42.305, -71.075], 13);
  }
};

const refreshData = async () => {
  try {
    assignments = await base44.entities.Assignment.filter({ status: 'InProgress' }) || [];
    renderDashboard();
    document.getElementById('map-overlay').classList.add('hidden');
  } catch(e) {
    console.error(e);
    document.getElementById('map-overlay').innerHTML = '<div>ERROR LOADING DATA</div><div style="font-size:9px;margin-top:8px">RETRYING IN 30S...</div>';
  }
};

// Wire up refresh button properly — no onclick needed
document.getElementById('refresh-btn').addEventListener('click', refreshData);

const updateClock = () => {
  const et = new Date(new Date().toLocaleString('en-US', { timeZone:'America/New_York' }));
  const p = n => String(n).padStart(2,'0');
  document.getElementById('clock-et').textContent = p(et.getHours())+':'+p(et.getMinutes())+':'+p(et.getSeconds())+' ET';
};

const timeSince = iso => { if(!iso) return 'NO PING'; const d=Math.floor((Date.now()-new Date(iso))/1000); return d<60?d+'S AGO':d<3600?Math.floor(d/60)+'M AGO':Math.floor(d/3600)+'H AGO'; };
const isStale = iso => !iso||(Date.now()-new Date(iso))>30*60*1000;
const getStatus = a => isStale(a.last_ping_at)?'stale':(a.last_on_turf_status||'off');
const statusColor = s => s==='on'?'#00c8d4':s==='near'?'#ffd700':s==='stale'?'#333':'#ff4455';

const renderDashboard = () => {
  if(!assignments.length) {
    document.getElementById('canvasser-list').innerHTML='<div class="empty-state">NO ACTIVE FIELD UNITS<br>WAITING FOR SHIFT START</div>';
    ['kpi-active','kpi-onturf','kpi-stale','kpi-off'].forEach(id=>document.getElementById(id).textContent='0');
    buildTicker([]); return;
  }
  let active=0,onTurf=0,stale=0,off=0; const turfMap={};
  assignments.forEach(a => {
    const s=getStatus(a);
    if(s!=='stale')active++; if(s==='on')onTurf++; if(s==='stale')stale++; if(s==='off')off++;
    const t=a.turf_name||'UNASSIGNED';
    if(!turfMap[t])turfMap[t]={total:0,on:0};
    turfMap[t].total++; if(s==='on')turfMap[t].on++;
    updateMarker(a,s);
  });
  cleanupMarkers();
  document.getElementById('kpi-active').textContent=active;
  document.getElementById('kpi-onturf').textContent=onTurf;
  document.getElementById('kpi-stale').textContent=stale;
  document.getElementById('kpi-off').textContent=off;
  renderCanvasserList(); renderTurfBadges(turfMap); buildTicker(assignments); fitMap();
};

const updateMarker = (a,status) => {
  if(!a.last_lat||!a.last_lng) return;
  const color=statusColor(status), name=(a.canvasser_name||'UNKNOWN').toUpperCase();
  if(markers[a.id]) { markers[a.id].setLatLng([a.last_lat,a.last_lng]); markers[a.id].setStyle({fillColor:color}); }
  else {
    markers[a.id]=L.circleMarker([a.last_lat,a.last_lng],{radius:10,color:'#000',weight:2,fillColor:color,fillOpacity:1}).addTo(map);
    markers[a.id].bindTooltip(name,{permanent:true,direction:'top',offset:[0,-12]});
    markers[a.id].on('add',()=>{const el=markers[a.id].getTooltip()?._container;if(el)el.style.color=color;});
  }
};

const cleanupMarkers = () => {
  const ids=new Set(assignments.map(a=>a.id));
  Object.keys(markers).forEach(id=>{if(!ids.has(id)){map.removeLayer(markers[id]);delete markers[id];}});
};

const fitMap = () => {
  const pts=assignments.filter(a=>a.last_lat&&a.last_lng).map(a=>[a.last_lat,a.last_lng]);
  if(pts.length) try{map.fitBounds(pts,{padding:[40,40],maxZoom:15});}catch(e){}
};

const renderCanvasserList = () => {
  const sorted=[...assignments].sort((a,b)=>({on:0,near:1,off:2,stale:3}[getStatus(a)]||3)-({on:0,near:1,off:2,stale:3}[getStatus(b)]||3));
  document.getElementById('canvasser-list').innerHTML=sorted.map(a=>{
    const s=getStatus(a), label=s==='on'?'ON TURF':s==='near'?'NEAR':s==='stale'?'STALE':'OFF TURF';
    return `<div class="gh-canvasser status-${s}"><div class="gh-c-dot"></div><div class="gh-c-info"><div class="gh-c-name">${(a.canvasser_name||'UNKNOWN').toUpperCase()}</div><div class="gh-c-status">${label}${a.turf_name?' · '+a.turf_name.toUpperCase():''}</div></div><div class="gh-c-meta"><div class="gh-c-ping">${timeSince(a.last_ping_at)}</div><div class="gh-c-ping-label">LAST PING</div></div></div>`;
  }).join('');
};

const renderTurfBadges = turfMap => {
  document.getElementById('turf-badges').innerHTML=Object.entries(turfMap).map(([name,d])=>{
    const pct=d.total>0?d.on/d.total:0, cls=pct>=0.75?'badge-good':pct>=0.4?'badge-warn':'badge-bad';
    return `<div class="gh-turf-badge ${cls}"><div class="badge-name">${name.toUpperCase()}</div><div class="badge-count">${d.on}/${d.total} ON TURF</div></div>`;
  }).join('');
};

const buildTicker = list => {
  const track=document.getElementById('ticker-track');
  if(!list.length){track.textContent='NO ACTIVE FIELD UNITS';track.classList.remove('animate');return;}
  const items=list.map(a=>{
    const s=getStatus(a), label=s==='on'?'ON TURF':s==='near'?'NEAR':s==='stale'?'STALE':'OFF TURF';
    const cls=s==='on'?'tick-on':s==='near'?'tick-near':'tick-off';
    return `<span class="gh-tick-item"><span class="${cls}">[${label}]</span> <span class="tick-name">${(a.canvasser_name||'UNKNOWN').toUpperCase()}</span> · ${(a.turf_name||'').toUpperCase()} · ${timeSince(a.last_ping_at)}</span>`;
  });
  track.innerHTML=[...items,...items].join(''); track.classList.add('animate');
};

initMap();
refreshData();
setInterval(refreshData, 30000);
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
